<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Secretary</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="brand-icon">F</div>
          <div class="brand-text">Felix</div>
        </div>
        <nav class="sidebar-nav">
          <button class="nav-item active" data-tab="dashboard">
            <span class="nav-icon">◉</span>
            <span class="nav-label">Dashboard</span>
          </button>
          <button class="nav-item" data-tab="chat">
            <span class="nav-icon">💬</span>
            <span class="nav-label">Chat</span>
          </button>
          <button class="nav-item" data-tab="calendar">
            <span class="nav-icon">📅</span>
            <span class="nav-label">Calendar</span>
          </button>
          <button class="nav-item" data-tab="tasks">
            <span class="nav-icon">✓</span>
            <span class="nav-label">Tasks</span>
          </button>
        </nav>
        <div class="sidebar-footer">
          <button id="settingsBtn" class="nav-item">
            <span class="nav-icon">⚙</span>
            <span class="nav-label">Settings</span>
          </button>
        </div>
      </aside>

      <main class="main-content">
        <header class="topbar">
          <div class="page-title" id="pageTitle">Dashboard</div>
          <div class="top-actions">
            <button id="refreshBtn" class="btn">Refresh</button>
          </div>
        </header>

        <div class="content-area">
          <section id="tab-dashboard" class="tab-content active">
            <div class="dashboard-grid">
              <div class="dash-card">
                <div class="dash-card-header">
                  <span class="dash-card-title">Today's Events</span>
                  <span class="dash-card-count" id="todayEventsCount">0</span>
                </div>
                <div class="dash-card-body" id="todayEventsList"></div>
              </div>
              <div class="dash-card">
                <div class="dash-card-header">
                  <span class="dash-card-title">Pending Tasks</span>
                  <span class="dash-card-count" id="pendingTasksCount">0</span>
                </div>
                <div class="dash-card-body" id="pendingTasksList"></div>
              </div>
              <div class="dash-card dash-card-wide">
                <div class="dash-card-header">
                  <span class="dash-card-title">Quick Actions</span>
                </div>
                <div class="dash-card-body dash-actions">
                  <button id="dashAddTask" class="btn btn-primary">Add Task</button>
                  <button id="dashAddEvent" class="btn btn-primary">Add Event</button>
                  <label class="upload">
                    <input id="screenshotInput" type="file" accept="image/*" />
                    <span class="btn">Import Screenshot</span>
                  </label>
                </div>
              </div>
            </div>
          </section>

          <section id="tab-chat" class="tab-content">
            <div class="chat-container">
              <div class="chat-header">
                <div class="chat-title">Assistant</div>
                <div class="row">
                  <button id="recordBtn" class="btn">Record</button>
                  <button id="stopBtn" class="btn" disabled>Stop</button>
                </div>
              </div>
              <div id="chatLog" class="chat"></div>
              <div class="chatbox">
                <input id="chatInput" type="text" placeholder="Try: add meeting with Bob tomorrow 3pm for 30 minutes" />
                <button id="sendBtn" class="btn btn-primary">Send</button>
              </div>
              <div id="status" class="status"></div>
            </div>
          </section>

          <section id="tab-calendar" class="tab-content">
            <div class="panel-header">
              <div class="panel-title">Calendar Events</div>
              <button id="addEventBtn" class="btn btn-primary">Add Event</button>
            </div>
            <div id="eventsList" class="list"></div>
          </section>

          <section id="tab-tasks" class="tab-content">
            <div class="panel-header">
              <div class="panel-title">Tasks</div>
              <button id="addTaskBtn" class="btn btn-primary">Add Task</button>
            </div>
            <div id="tasksList" class="list"></div>
          </section>
        </div>
      </main>
    </div>

    <dialog id="modal" class="modal">
      <form method="dialog" id="modalForm" class="modal-form">
        <div class="modal-title" id="modalTitle"></div>
        <div id="modalBody" class="modal-body"></div>
        <div class="modal-actions">
          <button class="btn" value="cancel">Cancel</button>
          <button class="btn btn-primary" id="modalSave" value="default">Save</button>
        </div>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
